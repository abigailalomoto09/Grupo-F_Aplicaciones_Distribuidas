<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lobby - DrawBattle</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="min-h-screen bg-cover bg-center bg-no-repeat overflow-hidden text-white"
    style="background-image: url('/imagenes/fondo_lobby.png');"
>

    <!-- OVERLAY -->
    <div class="absolute inset-0 bg-black/55 backdrop-blur-[2px]"></div>

    <!-- CONTENIDO -->
    <main class="relative z-10 min-h-screen flex flex-col px-10 py-10">
        
        <!-- HEADER -->
        <header class="flex items-start justify-between mb-10">

            <!-- IZQUIERDA -->
            <div>
                <h1 class="text-7xl font-black text-cyan-400 drop-shadow-[0_0_25px_rgba(34,211,238,0.9)]">
                    DrawBattle
                </h1>

                <p class="text-slate-200 text-2xl mt-3">
                    Esperando jugadores para iniciar la partida
                </p>
            </div>

            <!-- DERECHA -->
            <div class="flex items-center gap-4 bg-slate-900/30 backdrop-blur-xl border border-white/10 px-8 py-4 rounded-full">

                <div class="w-4 h-4 rounded-full bg-green-400 animate-pulse"></div>

                <span class="text-xl text-slate-200">
                    Jugadores conectados:
                </span>

                <span
                    id="totalPlayers"
                    class="text-3xl font-black text-cyan-400"
                >
                    0
                </span>

            </div>

        </header>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="flex flex-1 gap-10 overflow-hidden">

            <!-- PANEL IZQUIERDO -->
            <section class="flex-1 overflow-y-auto">
                <!-- JUGADORES -->
                <div
                    id="playersContainer"
                    class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 pr-4"
                >       
                </div>
            </section>

            <!-- PANEL DERECHO -->
            <aside class="w-[380px] flex-shrink-0">
                <div class="bg-slate-900/30 backdrop-blur-xl border border-white/10 rounded-[35px] p-8 sticky top-0">
                    <!-- TITULO -->
                    <h2
                        class="text-4xl font-black text-cyan-400 mb-10 text-center"
                    >
                        Configuración
                    </h2>

                    <!-- TIEMPO -->
                    <div class="mb-10">

                        <label class="block text-2xl font-bold mb-5" for="roundTimeBtn">
                            Tiempo por ronda
                        </label>

                        <div class="relative" id="roundTimeSelect">
                            <input type="hidden" id="roundTime" value="20">

                            <button
                                type="button"
                                id="roundTimeBtn"
                                class="w-full bg-slate-900/70 border border-cyan-400/30 px-6 py-5 rounded-3xl text-xl text-white outline-none cursor-pointer flex items-center justify-between gap-4 hover:border-cyan-400 focus:border-cyan-400 focus:shadow-[0_0_20px_rgba(34,211,238,0.5)] transition-all"
                            >
                                <span id="roundTimeLabel">20 segundos</span>
                                <svg
                                    id="roundTimeArrow"
                                    class="w-5 h-5 text-cyan-400 shrink-0 transition-transform duration-200"
                                    fill="none"
                                    stroke="currentColor"
                                    viewBox="0 0 24 24"
                                >
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </button>

                            <ul
                                id="roundTimeMenu"
                                class="hidden absolute left-0 right-0 top-[calc(100%+8px)] z-20 bg-slate-900/95 backdrop-blur-xl border border-cyan-400/30 rounded-3xl overflow-hidden shadow-[0_0_25px_rgba(34,211,238,0.25)]"
                            >
                                <li>
                                    <button
                                        type="button"
                                        data-value="20"
                                        class="round-time-option w-full text-left px-6 py-4 text-lg text-white bg-cyan-400/20 hover:bg-cyan-400/30 transition-colors"
                                    >
                                        20 segundos
                                    </button>
                                </li>
                                <li>
                                    <button
                                        type="button"
                                        data-value="40"
                                        class="round-time-option w-full text-left px-6 py-4 text-lg text-white hover:bg-cyan-400/20 transition-colors"
                                    >
                                        40 segundos
                                    </button>
                                </li>
                                <li>
                                    <button
                                        type="button"
                                        data-value="60"
                                        class="round-time-option w-full text-left px-6 py-4 text-lg text-white hover:bg-cyan-400/20 transition-colors"
                                    >
                                        60 segundos
                                    </button>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <!-- BOTON -->
                    <button
                        id="startGameBtn"
                        class="w-full bg-gradient-to-r from-cyan-400 to-purple-500 hover:scale-[1.03] transition-all duration-300 py-6 rounded-3xl text-black text-3xl font-black shadow-[0_0_35px_rgba(34,211,238,0.5)]"
                    >
                        Iniciar Partida
                    </button>
                </div>
            </aside>
        </div>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/lobby.js"></script>
</body>

</html>
