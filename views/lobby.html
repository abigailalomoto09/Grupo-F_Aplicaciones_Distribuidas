<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lobby - DrawBattle</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="min-h-screen bg-cover bg-center bg-no-repeat overflow-hidden text-white"
    style="background-image: url('/imagenes/fondo_lobby.png');"
>

    <!-- OVERLAY -->
    <div class="absolute inset-0 bg-black/55 backdrop-blur-[2px]"></div>

    <!-- CONTENIDO -->
    <main class="relative z-10 min-h-screen flex flex-col px-10 py-10">

        <!-- HEADER -->
        <header class="mb-10">
            <h1 class="text-7xl font-black text-cyan-400 drop-shadow-[0_0_25px_rgba(34,211,238,0.9)]">
                DrawBattle
            </h1>

            <p class="text-slate-200 text-2xl mt-3">
                Esperando jugadores para iniciar la partida
            </p>
        </header>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="flex flex-1 gap-10 overflow-hidden">

            <!-- PANEL IZQUIERDO -->
            <section class="flex-1 overflow-y-auto">

                <div class="inline-flex items-center gap-4 bg-slate-900/30 backdrop-blur-xl border border-white/10 px-8 py-4 rounded-full mb-10">
                    <div class="w-4 h-4 rounded-full bg-green-400 animate-pulse"></div>

                    <span class="text-xl text-slate-200">
                        Jugadores conectados:
                    </span>

                    <span
                        id="totalPlayers"
                        class="text-3xl font-black text-cyan-400"
                    >
                        0
                    </span>
                </div>

                <!-- JUGADORES -->
                <div
                    id="playersContainer"
                    class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 pr-4"
                >       
                </div>
            </section>

            <!-- PANEL DERECHO -->
            <aside class="w-[380px] flex-shrink-0">
                <div class="bg-slate-900/30 backdrop-blur-xl border border-white/10 rounded-[35px] p-8 sticky top-0">

                    <!-- TITULO -->
                    <h2
                        class="text-4xl font-black text-cyan-400 mb-10 text-center"
                    >
                        Configuración
                    </h2>

                    <!-- TIEMPO -->
                    <div class="mb-10">

                        <label class="block text-2xl font-bold mb-5">
                            Tiempo por ronda
                        </label>

                        <select
                            id="roundTime"
                            class="w-full bg-slate-900/40 border border-white/10 px-6 py-5 rounded-3xl text-xl text-white outline-none focus:border-cyan-400 focus:shadow-[0_0_20px_rgba(34,211,238,0.5)] transition-all"
                        >

                            <option value="20">
                                20 segundos
                            </option>

                            <option value="40">
                                40 segundos
                            </option>

                            <option value="60">
                                60 segundos
                            </option>

                        </select>
                    </div>

                    <!-- ESTADO -->
                    <div
                        id="roomStatus"
                        class="bg-slate-950/30 border border-white/10 rounded-3xl p-6 text-center text-cyan-300 text-2xl font-bold mb-10"
                    >
                        Esperando más jugadores...
                    </div>

                    <!-- BOTON -->
                    <button
                        id="startGameBtn"
                        class="w-full bg-gradient-to-r from-cyan-400 to-purple-500 hover:scale-[1.03] transition-all duration-300 py-6 rounded-3xl text-black text-3xl font-black shadow-[0_0_35px_rgba(34,211,238,0.5)]"
                    >
                        Iniciar Partida
                    </button>
                </div>
            </aside>
        </div>
    </main>
</body>

</html>
