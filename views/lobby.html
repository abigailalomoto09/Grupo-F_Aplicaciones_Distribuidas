<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby - DrawBattle</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="min-h-screen bg-cover bg-center bg-no-repeat overflow-hidden text-white"
    style="background-image: url('/imagenes/fondo_lobby.png');"
>
    <div class="absolute inset-0 bg-black/55 backdrop-blur-[2px]"></div>

    <main class="relative z-10 min-h-screen flex flex-col px-10 py-8">

        <!-- HEADER -->
        <header class="flex items-center justify-between mb-10">

            <!-- TÍTULO + SUBTÍTULO -->
            <div>
                <h1 class="text-7xl font-black text-cyan-400 drop-shadow-[0_0_25px_rgba(34,211,238,0.9)]">
                    DrawBattle
                </h1>
                <p class="text-slate-200 text-2xl mt-2">
                    Esperando jugadores para iniciar la partida
                </p>
            </div>

            <!-- USUARIO LOGUEADO (lado derecho del header) -->
            <div
                id="userInfo"
                class="flex items-center gap-3 bg-slate-900/40 backdrop-blur-xl border border-white/10 px-5 py-3 rounded-2xl"
            >
                <!-- Se llena desde authUser.js -->
            </div>

        </header>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="flex flex-1 gap-10 overflow-hidden">

            <!-- PANEL IZQUIERDO -->
            <section class="flex-1 overflow-y-auto">

                <div class="inline-flex items-center gap-4 bg-slate-900/30 backdrop-blur-xl border border-white/10 px-8 py-4 rounded-full mb-10">
                    <div class="w-4 h-4 rounded-full bg-green-400 animate-pulse"></div>
                    <span class="text-xl text-slate-200">Jugadores conectados:</span>
                    <span id="totalPlayers" class="text-3xl font-black text-cyan-400">0</span>
                </div>

                <!-- JUGADORES -->
                <div
                    id="playersContainer"
                    class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 pr-4"
                ></div>

            </section>

            <!-- PANEL DERECHO -->
            <aside class="w-full md:w-[380px] flex-shrink-0">
                <div class="bg-slate-900/30 backdrop-blur-xl border border-white/10 rounded-[35px] p-6 md:p-8 sticky top-4">

                    <h2 class="text-4xl font-black text-cyan-400 mb-8 text-center">
                        Configuración
                    </h2>

                    <!-- TIEMPO -->
                    <div class="mb-6">
                        <label class="block text-lg font-bold text-slate-300 mb-3 uppercase tracking-widest text-sm">
                            Tiempo por ronda
                        </label>

                        <!-- SELECT TIEMPO — diseño custom -->
                        <div class="relative">
                            <select
                                id="roundTime"
                                class="
                                    w-full appearance-none
                                    bg-slate-950/80
                                    border border-cyan-400/30
                                    hover:border-cyan-400/60
                                    focus:border-cyan-400
                                    focus:outline-none
                                    focus:ring-2 focus:ring-cyan-500/20
                                    px-5 py-4
                                    rounded-2xl
                                    text-lg text-white
                                    cursor-pointer
                                    transition-all duration-200
                                    disabled:opacity-40 disabled:cursor-not-allowed
                                "
                            >
                                <option value="20" class="bg-slate-950 text-white">20 segundos</option>
                                <option value="40" class="bg-slate-950 text-white">40 segundos</option>
                                <option value="60" class="bg-slate-950 text-white">60 segundos</option>
                            </select>
                            <!-- Flecha custom -->
                            <div class="pointer-events-none absolute inset-y-0 right-4 flex items-center">
                                <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- RONDAS -->
                    <div class="mb-8">
                        <label class="block text-lg font-bold text-slate-300 mb-3 uppercase tracking-widest text-sm">
                            Número de rondas
                        </label>

                        <div class="relative">
                            <select
                                id="maxRounds"
                                class="
                                    w-full appearance-none
                                    bg-slate-950/80
                                    border border-cyan-400/30
                                    hover:border-cyan-400/60
                                    focus:border-cyan-400
                                    focus:outline-none
                                    focus:ring-2 focus:ring-cyan-500/20
                                    px-5 py-4
                                    rounded-2xl
                                    text-lg text-white
                                    cursor-pointer
                                    transition-all duration-200
                                    disabled:opacity-40 disabled:cursor-not-allowed
                                "
                            >
                                <option value="1" class="bg-slate-950 text-white">1 ronda</option>
                                <option value="2" class="bg-slate-950 text-white">2 rondas</option>
                                <option value="3" class="bg-slate-950 text-white" selected>3 rondas</option>
                                <option value="4" class="bg-slate-950 text-white">4 rondas</option>
                                <option value="5" class="bg-slate-950 text-white">5 rondas</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-4 flex items-center">
                                <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- BOTÓN INICIAR -->
                    <button
                        id="startGameBtn"
                        class="w-full bg-gradient-to-r from-cyan-400 to-purple-500 hover:scale-[1.03] active:scale-[0.98] transition-all duration-300 py-6 rounded-3xl text-black text-3xl font-black shadow-[0_0_35px_rgba(34,211,238,0.5)] disabled:opacity-40 disabled:cursor-not-allowed disabled:scale-100"
                    >
                        Iniciar Partida
                    </button>

                </div>
            </aside>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/authUser.js"></script>
    <script src="/js/lobby.js"></script>
</body>

</html>
