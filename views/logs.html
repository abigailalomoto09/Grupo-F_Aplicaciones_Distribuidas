<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs - DrawBattle</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-950 text-white overflow-x-hidden overflow-y-auto">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(34,211,238,0.18),_transparent_40%),linear-gradient(180deg,_rgba(2,6,23,0.95),_rgba(15,23,42,1))]"></div>

  <main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 sm:py-8">
    <header class="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between mb-8">
      <div class="min-w-0">
        <p class="text-cyan-400 uppercase tracking-[0.35em] text-[10px] sm:text-xs mb-2">Observabilidad</p>
        <h1 class="text-3xl sm:text-4xl md:text-6xl font-black break-words">Resumen de Logs</h1>
        <p class="text-slate-300 mt-3 max-w-3xl text-sm sm:text-base">
          Aquí puedes ver eventos del servidor por nivel, revisar el detalle reciente y validar que el juego
          siga funcionando sin afectar la experiencia de DrawBattle.
        </p>
      </div>
      <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
        <button id="demoBtn" class="w-full sm:w-auto px-5 py-3 rounded-2xl border border-cyan-400/30 text-cyan-200 hover:bg-cyan-400/10 transition text-sm sm:text-base">
          Generar logs de prueba
        </button>
        <button id="refreshBtn" class="w-full sm:w-auto px-5 py-3 rounded-2xl bg-cyan-400 text-black font-black hover:bg-cyan-300 transition text-sm sm:text-base">
          Actualizar
        </button>
        <a href="/" class="w-full sm:w-auto px-5 py-3 rounded-2xl border border-white/15 text-slate-200 hover:bg-white/5 transition text-center text-sm sm:text-base">
          Volver al juego
        </a>
      </div>
    </header>

    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4 mb-8" id="summaryCards"></section>

    <section class="grid grid-cols-1 xl:grid-cols-3 gap-6">
      <div class="xl:col-span-2 bg-slate-900/80 border border-white/10 rounded-3xl p-4 sm:p-6 shadow-2xl shadow-cyan-500/5">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-5">
          <h2 class="text-xl sm:text-2xl font-black">Últimos eventos</h2>
          <span id="generatedAt" class="text-slate-400 text-xs sm:text-sm"></span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left min-w-[720px]">
            <thead class="text-slate-400 text-sm uppercase tracking-wider border-b border-white/10">
              <tr>
                <th class="py-3 pr-4">Fecha</th>
                <th class="py-3 pr-4">Nivel</th>
                <th class="py-3 pr-4">Evento</th>
                <th class="py-3 pr-4">Mensaje</th>
              </tr>
            </thead>
            <tbody id="recentLogs" class="divide-y divide-white/5"></tbody>
          </table>
        </div>
      </div>

      <aside class="bg-slate-900/80 border border-white/10 rounded-3xl p-4 sm:p-6 shadow-2xl shadow-cyan-500/5">
        <h2 class="text-xl sm:text-2xl font-black mb-5">Eventos más frecuentes</h2>
        <div id="eventSummary" class="space-y-3"></div>
      </aside>
    </section>
  </main>

  <script src="/js/logs.js"></script>
</body>

</html>
