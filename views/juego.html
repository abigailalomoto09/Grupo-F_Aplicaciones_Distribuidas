<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Partida - DrawBattle</title>

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen overflow-x-hidden overflow-y-auto lg:overflow-hidden">

    <div class="flex min-h-screen w-full flex-col lg:flex-row">

        <!-- SIDEBAR IZQUIERDO -->
        <aside class="w-full lg:w-80 xl:w-96 flex-shrink-0 bg-slate-900 border-b lg:border-b-0 lg:border-r border-slate-800 flex flex-col lg:h-screen min-w-0">

            <!-- HEADER -->
            <div class="p-4 sm:p-6 border-b border-slate-800">

                <h1 class="text-3xl sm:text-4xl font-black text-cyan-400 break-words">
                    DrawBattle
                </h1>

                <p class="text-slate-400 mt-2 text-sm sm:text-base">
                    Partida en progreso
                </p>

            </div>

            <!-- TEMPORIZADOR -->
            <div class="p-4 sm:p-6 border-b border-slate-800">

                <p class="text-slate-400 mb-3 text-sm sm:text-base">
                    Tiempo restante
                </p>

                <div
                    id="timer"
                    class="bg-slate-800 rounded-2xl py-4 sm:py-6 text-center"
                >

                    <h2 class="text-4xl sm:text-5xl lg:text-6xl font-black text-cyan-400">
                    </h2>

                </div>

            </div>

            <!-- PALABRA -->
            <div class="p-4 sm:p-6 border-b border-slate-800">

                <p class="text-slate-400 mb-3 text-sm sm:text-base">
                    Palabra
                </p>

                <div class="bg-slate-800 rounded-2xl p-4 sm:p-5">

                    <h2
                        id="currentWord"
                        class="text-xl sm:text-2xl lg:text-3xl font-black tracking-[0.18em] text-center break-words"
                    >
                        _ _ _ _ _
                    </h2>

                </div>

            </div>

            <!-- JUGADORES -->
            <div class="flex-1 overflow-y-auto p-4 sm:p-6 min-h-0">

                <div class="flex items-center justify-between mb-5">

                    <h2 class="text-lg sm:text-2xl font-bold">
                        Puntajes
                    </h2>

                    <span
                        id="playersCount"
                        class="bg-cyan-500 text-black px-3 py-1 rounded-xl font-bold text-xs sm:text-sm whitespace-nowrap"
                    >
                        0 jugadores
                    </span>

                </div>

                <!-- CONTENEDOR JUGADORES -->
                <div
                    id="scoreboard"
                    class="space-y-3 sm:space-y-4"
                >

                    <!--
                        LOS JUGADORES SE AGREGAN DESDE JS
                    -->

                </div>

            </div>

        </aside>

        <!-- AREA CENTRAL -->
        <main class="flex-1 flex flex-col min-h-0 min-w-0">

            <!-- TOPBAR -->
            <div class="min-h-20 sm:min-h-24 border-b border-slate-800 bg-slate-900 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between px-4 sm:px-8 py-4">

                <!-- DIBUJANTE -->
                <div class="min-w-0">

                    <p class="text-slate-400 text-xs sm:text-sm">
                        Dibujando ahora
                    </p>

                    <h2
                        id="drawerName"
                        class="text-xl sm:text-2xl lg:text-3xl font-black text-cyan-400 break-words"
                    >
                        ---
                    </h2>

                </div>

                <!-- ESTADO -->
                <div
                    id="gameStatus"
                    class="bg-cyan-500 text-black px-4 sm:px-6 py-2 sm:py-3 rounded-2xl font-black text-sm sm:text-lg self-start sm:self-auto whitespace-nowrap"
                >
                    Ronda activa
                </div>

            </div>

            <!-- CANVAS -->
            <div class="flex-1 flex items-center justify-center p-3 sm:p-4 lg:p-6 bg-slate-950 min-h-0 min-w-0">
                <div class="bg-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-5xl h-[52vh] min-h-[320px] sm:h-[58vh] lg:h-full lg:min-h-0">
                    <canvas id="gameCanvas" class="block w-full h-full"></canvas>
                </div>
            </div>

        </main>

        <!-- CHAT -->
        <aside class="w-full lg:w-96 flex-shrink-0 bg-slate-900 border-t lg:border-t-0 lg:border-l border-slate-800 flex flex-col lg:h-screen min-w-0">

            <!-- HEADER CHAT -->
            <div class="p-4 sm:p-6 border-b border-slate-800">

                <h2 class="text-2xl sm:text-3xl font-black text-cyan-400">
                    Chat
                </h2>

                <p class="text-slate-400 mt-1 text-sm sm:text-base">
                    Adivina el dibujo
                </p>

            </div>

            <!-- MENSAJES -->
            <div
                id="chatMessages"
                class="flex-1 overflow-y-auto p-4 sm:p-5 space-y-3 sm:space-y-4 min-h-0"
            >

            </div>

            <!-- INPUT -->
            <div class="p-4 sm:p-5 border-t border-slate-800">

                <form
                    id="chatForm"
                    class="flex gap-2 sm:gap-3"
                >

                    <input
                        type="text"
                        id="chatInput"
                        placeholder="Escribe tu respuesta..."
                        autocomplete="off"
                        class="flex-1 min-w-0 bg-slate-800 border border-slate-700 rounded-2xl px-4 sm:px-5 py-3 sm:py-4 outline-none focus:border-cyan-400 text-sm sm:text-base"
                    >

                    <button
                        class="bg-cyan-500 hover:bg-cyan-400 transition-all text-black font-black px-4 sm:px-6 rounded-2xl text-sm sm:text-base whitespace-nowrap"
                    >
                        Enviar
                    </button>

                </form>

            </div>

        </aside>

    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/juego.js"></script>
    <script src="/js/canvas.js"></script>
</body>

</html>
