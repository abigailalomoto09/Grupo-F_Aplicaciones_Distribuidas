<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrawBattle</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="min-h-screen bg-cover bg-center bg-no-repeat flex items-start sm:items-center justify-center overflow-x-hidden overflow-y-auto py-6 sm:py-10"
    style="background-image: url('/imagenes/fondo.png');"
>
    <div class="absolute inset-0 bg-black/50 backdrop-blur-[2px]"></div>

    <div class="relative z-10 w-full max-w-[520px] px-4 sm:px-6">
        <div class="bg-slate-900/60 backdrop-blur-xl border border-cyan-400/30 rounded-[30px] p-5 sm:p-6 md:p-8 shadow-[0_0_40px_rgba(34,211,238,0.2)] text-white">
            <h1 class="text-4xl sm:text-5xl font-black text-cyan-400 text-center mb-2 drop-shadow-[0_0_10px_rgba(34,211,238,0.6)] break-words">
                DrawBattle
            </h1>
            <p class="text-slate-300 text-center text-xs sm:text-sm mb-5 sm:mb-6 font-medium tracking-wide">
                El caos empieza con un lápiz.
            </p>

            <!-- TABS -->
            <div class="flex border-b border-slate-700/60 mb-5 sm:mb-6">
                <button id="tabLogin" class="flex-1 pb-3 text-center font-bold text-xs sm:text-sm border-b-2 border-cyan-400 text-cyan-400 transition-all duration-200">
                    Iniciar Sesión
                </button>
                <button id="tabRegister" class="flex-1 pb-3 text-center font-bold text-xs sm:text-sm border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all duration-200">
                    Registrarse
                </button>
            </div>

            <!-- CONTENEDOR DE ERRORES/ÉXITOS -->
            <div id="alertMessage" class="hidden mb-4 p-3 rounded-xl text-xs font-semibold text-center transition-all duration-200 break-words"></div>

            <!-- FORMULARIO DE LOGIN -->
            <form id="formLogin" class="space-y-4">
                <div>
                    <label class="block text-[11px] sm:text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Usuario o Correo</label>
                    <input type="text" id="loginUsername" required placeholder="Ingresa tu usuario o correo"
                        class="w-full bg-slate-950/50 border border-slate-800 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400/30 text-white rounded-xl py-3 px-4 outline-none text-sm transition-all duration-200 placeholder:text-slate-600">
                </div>
                <div>
                    <label class="block text-[11px] sm:text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Contraseña</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••"
                        class="w-full bg-slate-950/50 border border-slate-800 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400/30 text-white rounded-xl py-3 px-4 outline-none text-sm transition-all duration-200 placeholder:text-slate-600">
                </div>
                <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 active:bg-cyan-600 transition-all duration-200 text-slate-950 font-extrabold py-3.5 rounded-xl text-sm shadow-[0_0_15px_rgba(34,211,238,0.3)]">
                    Entrar al Juego
                </button>
            </form>

            <!-- FORMULARIO DE REGISTRO -->
            <form id="formRegister" class="space-y-4 hidden">
                <div>
                    <label class="block text-[11px] sm:text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Nombre de Usuario</label>
                    <input type="text" id="registerUsername" required placeholder="Escribe tu username para el juego"
                        class="w-full bg-slate-950/50 border border-slate-800 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400/30 text-white rounded-xl py-3 px-4 outline-none text-sm transition-all duration-200 placeholder:text-slate-600">
                </div>
                <div>
                    <label class="block text-[11px] sm:text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Correo Electrónico</label>
                    <input type="email" id="registerEmail" required placeholder="ejemplo@correo.com"
                        class="w-full bg-slate-950/50 border border-slate-800 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400/30 text-white rounded-xl py-3 px-4 outline-none text-sm transition-all duration-200 placeholder:text-slate-600">
                </div>
                <div>
                    <label class="block text-[11px] sm:text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Contraseña</label>
                    <input type="password" id="registerPassword" required placeholder="Crea una contraseña"
                        class="w-full bg-slate-950/50 border border-slate-800 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400/30 text-white rounded-xl py-3 px-4 outline-none text-sm transition-all duration-200 placeholder:text-slate-600">
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 active:bg-emerald-600 transition-all duration-200 text-slate-950 font-extrabold py-3.5 rounded-xl text-sm shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                    Crear Cuenta y Registrarse
                </button>
            </form>

            <!-- DIVISOR -->
            <div class="relative my-5 sm:my-6 text-center">
                <hr class="border-slate-800">
                <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-900 px-3 text-xs font-bold text-slate-500 uppercase tracking-wider">
                    O
                </span>
            </div>

            <!-- GOOGLE LOGIN -->
            <a href="/auth/google" class="flex items-center justify-center gap-3 w-full bg-white hover:bg-slate-100 active:bg-slate-200 transition-all duration-200 text-slate-900 font-extrabold py-3 rounded-xl text-sm break-words">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continuar con Google
            </a>

        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/index.js"></script>
</body>

</html>
